<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Greenpepper au Charystream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #ebe9dd;
      --text: #421508;
      --tab-bg: rgba(255, 255, 255, 0.55);
      --tab-active: #f06423;
      --tab-active-2: #e857ef;
      --shadow: rgba(0, 0, 0, 0.18);
      --border: rgba(66, 21, 8, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 28px 14px 48px;
    }

    main {
      width: 100%;
      max-width: 1250px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 26px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 760px;
      margin: 0 auto 30px;
      padding: 8px;
      background: var(--tab-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 12px 32px var(--shadow);
    }

    .tab {
      border: 0;
      cursor: pointer;
      padding: 16px 18px;
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      font-weight: 800;
      opacity: 0.7;
      transition: 160ms ease;
    }

    .tab:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.45);
    }

    .tab.active {
      opacity: 1;
      color: white;
      background: linear-gradient(135deg, var(--tab-active), var(--tab-active-2));
      box-shadow: 0 10px 24px rgba(240, 100, 35, 0.25);
    }

    .content {
      display: none;
    }

    .content.active {
      display: block;
      animation: fadeIn 160ms ease;
    }

    .image-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .image-list img {
      display: block;
      width: 100%;
      max-width: 1250px;
      height: auto;
      margin: 0;
      padding: 0;
      border: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 18px 8px 36px;
      }

      .tabs {
        border-radius: 22px;
      }

      .tab {
        border-radius: 16px;
        padding: 14px 8px;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>Greenpepper au Charystream</h1>
    </header>

    <nav class="tabs" aria-label="Sélection du contenu">
      <button class="tab active" type="button" data-target="donation-goals">
        Donation goals
      </button>

      <button class="tab" type="button" data-target="planning">
        Planning
      </button>
    </nav>

    <section id="donation-goals" class="content active">
      <div class="image-list">
        <img src="goals/goal-1.webp" alt="Donation goals Greenpepper - partie 1">
        <img src="goals/goal-2.webp" alt="Donation goals Greenpepper - partie 2">
        <img src="goals/goal-3.webp" alt="Donation goals Greenpepper - partie 3">
      </div>
    </section>

    <section id="planning" class="content">
      <div class="image-list">
        <img src="planning/planning.png" alt="Planning Greenpepper au Charystream">
      </div>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const contents = document.querySelectorAll(".content");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.target;

        tabs.forEach((item) => {
          item.classList.remove("active");
        });

        contents.forEach((content) => {
          content.classList.remove("active");
        });

        tab.classList.add("active");
        document.getElementById(target).classList.add("active");
      });
    });
  </script>
</body>
</html>
