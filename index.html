<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Greenpepper au Charystream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #08110c;
      --panel: #111f17;
      --panel-light: #183022;
      --text: #f3fff6;
      --muted: #b7c8bd;
      --green: #49ff8f;
      --green-dark: #24b85f;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(73, 255, 143, 0.12), transparent 35%),
        linear-gradient(180deg, #08110c 0%, #050806 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 32px 16px;
    }

    main {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 30px var(--shadow);
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      margin: 0 auto 28px;
      max-width: 720px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 18px 50px var(--shadow);
      backdrop-filter: blur(10px);
    }

    .tab {
      appearance: none;
      border: 0;
      cursor: pointer;
      padding: 16px 18px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-weight: 800;
      transition:
        background 180ms ease,
        color 180ms ease,
        transform 180ms ease,
        box-shadow 180ms ease;
    }

    .tab:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .tab.active {
      color: #041007;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      box-shadow: 0 10px 26px rgba(73, 255, 143, 0.22);
    }

    .tab.active:hover {
      transform: translateY(-1px);
    }

    .content {
      display: none;
      animation: fadeIn 180ms ease;
    }

    .content.active {
      display: block;
    }

    .image-grid {
      display: grid;
      gap: 22px;
    }

    .image-card {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 50px var(--shadow);
    }

    .image-card img {
      display: block;
      width: 100%;
      height: auto;
    }

    .empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
    }

    footer {
      margin-top: 34px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 22px 12px;
      }

      .tabs {
        border-radius: 24px;
      }

      .tab {
        border-radius: 18px;
        padding: 14px 10px;
      }

      .image-card {
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>Greenpepper au Charystream</h1>
      <div class="subtitle">Planning et donation goals de l’événement</div>
    </header>

    <nav class="tabs" aria-label="Sélection du contenu">
      <button class="tab active" type="button" data-target="goals">
        Donation goals
      </button>

      <button class="tab" type="button" data-target="planning">
        Planning
      </button>
    </nav>

    <section id="goals" class="content active">
      <div class="image-grid">
        <article class="image-card">
          <img src="goals/goal-1.jpg" alt="Donation goal 1">
        </article>

        <article class="image-card">
          <img src="goals/goal-2.jpg" alt="Donation goal 2">
        </article>

        <article class="image-card">
          <img src="goals/goal-3.jpg" alt="Donation goal 3">
        </article>
      </div>
    </section>

    <section id="planning" class="content">
      <div class="image-grid">
        <article class="image-card">
          <img src="planning/planning.jpg" alt="Planning de Greenpepper au Charystream">
        </article>
      </div>
    </section>

    <footer>
      Greenpepper · Charystream
    </footer>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const contents = document.querySelectorAll(".content");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.target;

        tabs.forEach((item) => {
          item.classList.remove("active");
        });

        contents.forEach((content) => {
          content.classList.remove("active");
        });

        tab.classList.add("active");
        document.getElementById(target).classList.add("active");
      });
    });
  </script>
</body>
</html>
